<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BART: Embarcadero → El Cerrito Plaza</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .header {
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #777;
    }

    .route-card {
      border: 1.5px solid #e8e8e8;
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
      position: relative;
      transition: border-color 0.15s;
    }

    .route-card.best {
      border-color: #2563eb;
      background: #f0f5ff;
    }

    .best-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #2563eb;
      color: #fff;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      margin-bottom: 0.6rem;
    }

    .route-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .legs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
    }

    .pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .arrow {
      color: #aaa;
      font-size: 0.9rem;
    }

    .transfer-note {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 0.75rem;
    }

    .transfer-note strong {
      color: #333;
    }

    .timing {
      display: flex;
      gap: 1.25rem;
    }

    .timing-item {
      display: flex;
      flex-direction: column;
    }

    .timing-label {
      font-size: 0.72rem;
      color: #888;
      font-weight: 500;
      margin-bottom: 0.1rem;
    }

    .timing-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .timing-value.highlight {
      color: #2563eb;
    }

    .divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 1.25rem 0;
    }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .updated-at {
      font-size: 0.78rem;
      color: #aaa;
    }

    button {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s;
    }

    button:hover { background: #333; }
    button:disabled { background: #ccc; cursor: default; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fff3f3;
      border: 1.5px solid #fca5a5;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: #b91c1c;
      margin-bottom: 1rem;
    }

    .loading-msg {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 1.5rem 0;
    }

    #results { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Embarcadero → El Cerrito Plaza</h1>
    <div class="subtitle">Real-time BART route recommendation</div>
  </div>

<div id="error-msg" class="error-msg" style="display:none"></div>
  <div id="results"></div>

  <hr class="divider">
  <div class="refresh-row">
    <span class="updated-at" id="updated-at"></span>
    <button id="refresh-btn" onclick="loadRoutes()">
      <span id="btn-icon">↻</span> Refresh
    </button>
  </div>
</div>

<script>
// ── Line colors ────────────────────────────────────────────────────────────
const LINE_COLORS = {
  RED:    '#E31837',
  YELLOW: '#FFD800',
  ORANGE: '#F9A01B',
  BLUE:   '#009BDE',
  GREEN:  '#4EB748',
};
const LINE_TEXT = { YELLOW: '#333' };

function lineStyle(color) {
  const key = color.toUpperCase();
  return `background:${LINE_COLORS[key] || '#888'};color:${LINE_TEXT[key] || '#fff'}`;
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// ── Constants ──────────────────────────────────────────────────────────────
const API_KEY = 'QXAJ-PUY3-9SKT-DWEI';

// Travel times (minutes) between stations
const TRAVEL_EMBR_TO_PLZA  = 26; // Embarcadero → El Cerrito Plaza (Red direct)
const TRAVEL_EMBR_TO_19TH  = 13; // Embarcadero → 19th St Oakland
const TRAVEL_EMBR_TO_LAKE  = 12; // Embarcadero → Lake Merritt
const TRAVEL_19TH_TO_PLZA  = 15; // 19th St Oakland → El Cerrito Plaza
const TRAVEL_LAKE_TO_PLZA  = 20; // Lake Merritt → El Cerrito Plaza

// ── API ────────────────────────────────────────────────────────────────────
async function fetchEtd(station) {
  const url = `https://api.bart.gov/api/etd.aspx?cmd=etd&orig=${station}&key=${API_KEY}&json=y`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data?.root?.message?.error) throw new Error(data.root.message.error.details || data.root.message.error.text);
  return data.root.station[0].etd;
}

// ── ETD helpers ────────────────────────────────────────────────────────────

// Return [{min, color}] for trains at a station heading toward destAbbr,
// optionally filtered to specific colors, sorted by departure time.
function getTrains(etdList, destAbbr, colors) {
  const entry = etdList.find(e => e.abbreviation === destAbbr);
  if (!entry) return [];
  return entry.estimate
    .filter(e => !colors || colors.includes(e.color))
    .map(e => ({ min: e.minutes === 'Leaving' ? 0 : parseInt(e.minutes, 10), color: e.color }))
    .filter(t => !isNaN(t.min))
    .sort((a, b) => a.min - b.min);
}

// Return [{min, color}] for all northbound trains of given colors across all destinations.
function getNorthbound(etdList, colors) {
  const results = [];
  for (const entry of etdList) {
    for (const e of entry.estimate) {
      if (e.direction !== 'North') continue;
      if (colors && !colors.includes(e.color)) continue;
      const m = e.minutes === 'Leaving' ? 0 : parseInt(e.minutes, 10);
      if (!isNaN(m)) results.push({ min: m, color: e.color });
    }
  }
  return results.sort((a, b) => a.min - b.min);
}

// Given a train that departed an intermediate station at connectingMin,
// find its PLZA arrival time. We look for a PLZA train within ±4 min of our
// estimated arrival (connectingMin + travelTime). If none found in that window
// (e.g. the train is too far out for the API's 3-train window), fall back to
// the estimate. Returns a plain minute number.
function plzaArrival(plzaTrains, connectingMin, travelTime) {
  const target = connectingMin + travelTime;
  const match = plzaTrains.find(t => Math.abs(t.min - target) <= 4);
  return match ? match.min : target;
}

// ── Route computation ──────────────────────────────────────────────────────
async function computeRoutes() {
  const [embrEtd, nth19Etd, lakeEtd, plzaEtd] = await Promise.all([
    fetchEtd('EMBR'),
    fetchEtd('19TH'),
    fetchEtd('LAKE'),
    fetchEtd('PLZA'),
  ]);

  const routes = [];

  // All Red and Orange trains at PLZA heading toward Richmond
  const plzaRichmond = getTrains(plzaEtd, 'RICH', ['RED', 'ORANGE']);

  // ── Route 1: Direct Red (EMBR → PLZA, no transfer) ────────────────────
  for (const train of getNorthbound(embrEtd, ['RED'])) {
    const arrival = plzaArrival(
      plzaRichmond.filter(t => t.color === 'RED'),
      train.min, TRAVEL_EMBR_TO_PLZA
    );
    routes.push({
      label: 'Direct — no transfer',
      legs: [{ color: 'RED', label: 'Red → Richmond' }],
      transferStation: null,
      departMinutes: train.min,
      waitMinutes: null,
      arrivalMinutes: arrival,
    });
    break;
  }

  // ── Route 2: Yellow → Red or Orange at 19th St Oakland ────────────────
  // 1. Yellow departs EMBR; arrives 19th = depart + TRAVEL_EMBR_TO_19TH
  // 2. Find next Red or Orange at 19th departing >= that arrival time
  // 3. Look up that connecting train's arrival at PLZA
  const redOrangeAt19th = getTrains(nth19Etd, 'RICH', ['RED', 'ORANGE']);
  for (const train of getNorthbound(embrEtd, ['YELLOW'])) {
    const arriveAt19th = train.min + TRAVEL_EMBR_TO_19TH;
    const connecting = redOrangeAt19th.find(t => t.min >= arriveAt19th);
    if (!connecting) continue;
    const arrival = plzaArrival(
      plzaRichmond.filter(t => t.color === connecting.color),
      connecting.min, TRAVEL_19TH_TO_PLZA
    );
    routes.push({
      label: 'Transfer at 19th St Oakland',
      legs: [
        { color: 'YELLOW', label: 'Yellow' },
        { color: connecting.color, label: `${capitalize(connecting.color)} → Richmond` },
      ],
      transferStation: '19th St Oakland',
      departMinutes: train.min,
      waitMinutes: connecting.min - arriveAt19th,
      arrivalMinutes: arrival,
    });
    break;
  }

  // ── Route 3: Blue or Green → Orange at Lake Merritt ───────────────────
  // 1. Blue/Green departs EMBR northbound; arrives Lake = depart + TRAVEL_EMBR_TO_LAKE
  // 2. Find next Orange at Lake departing >= that arrival time
  // 3. Look up that Orange train's arrival at PLZA
  const orangeAtLake = getTrains(lakeEtd, 'RICH', ['ORANGE']);
  for (const train of getNorthbound(embrEtd, ['BLUE', 'GREEN'])) {
    const arriveAtLake = train.min + TRAVEL_EMBR_TO_LAKE;
    const connecting = orangeAtLake.find(t => t.min >= arriveAtLake);
    if (!connecting) continue;
    const arrival = plzaArrival(
      plzaRichmond.filter(t => t.color === 'ORANGE'),
      connecting.min, TRAVEL_LAKE_TO_PLZA
    );
    routes.push({
      label: 'Transfer at Lake Merritt',
      legs: [
        { color: train.color, label: capitalize(train.color) },
        { color: 'ORANGE', label: 'Orange → Richmond' },
      ],
      transferStation: 'Lake Merritt',
      departMinutes: train.min,
      waitMinutes: connecting.min - arriveAtLake,
      arrivalMinutes: arrival,
    });
    break;
  }

  // Sort: earliest arrival at El Cerrito Plaza first; tie-break by soonest departure
  routes.sort((a, b) =>
    a.arrivalMinutes !== b.arrivalMinutes
      ? a.arrivalMinutes - b.arrivalMinutes
      : a.departMinutes - b.departMinutes
  );

  return routes;
}

// ── Rendering ──────────────────────────────────────────────────────────────
function formatMin(m) {
  return m === 0 ? 'Now' : `${m} min`;
}

function formatTime(minutesFromNow) {
  const d = new Date(Date.now() + minutesFromNow * 60000);
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function renderRoutes(routes) {
  if (!routes.length) {
    return '<div class="error-msg">No viable routes found right now. Try refreshing.</div>';
  }

  return routes.map((r, i) => {
    const isBest = i === 0;
    const legsHtml = r.legs
      .map(leg => `<span class="pill" style="${lineStyle(leg.color)}"><span class="dot"></span>${leg.label}</span>`)
      .join('<span class="arrow">→</span>');

    const transferHtml = r.transferStation
      ? `<div class="transfer-note">Transfer at <strong>${r.transferStation}</strong>${r.waitMinutes != null ? ` · ~${r.waitMinutes} min wait` : ''}</div>`
      : `<div class="transfer-note">No transfer needed</div>`;

    return `
      <div class="route-card${isBest ? ' best' : ''}">
        ${isBest ? '<span class="best-badge">Best Route</span>' : ''}
        <div class="route-label">${r.label}</div>
        <div class="legs">${legsHtml}</div>
        ${transferHtml}
        <div class="timing">
          <div class="timing-item">
            <span class="timing-label">Departs in</span>
            <span class="timing-value${isBest ? ' highlight' : ''}">${formatMin(r.departMinutes)}</span>
          </div>
          <div class="timing-item">
            <span class="timing-label">Arrives El Cerrito Plaza</span>
            <span class="timing-value">${formatTime(r.arrivalMinutes)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Load & refresh ─────────────────────────────────────────────────────────
async function loadRoutes() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('btn-icon');
  const errorEl = document.getElementById('error-msg');
  const resultsEl = document.getElementById('results');

  btn.disabled = true;
  icon.outerHTML = '<span id="btn-icon" class="spinner"></span>';
  errorEl.style.display = 'none';
  resultsEl.innerHTML = '<div class="loading-msg">Loading…</div>';
  resultsEl.style.display = 'block';

  try {
    const routes = await computeRoutes();
    resultsEl.innerHTML = renderRoutes(routes);
    document.getElementById('updated-at').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (err) {
    resultsEl.style.display = 'none';
    errorEl.textContent = `Error: ${err.message}`;
    errorEl.style.display = 'block';
  } finally {
    document.getElementById('btn-icon').outerHTML = '<span id="btn-icon">↻</span>';
    document.getElementById('refresh-btn').disabled = false;
  }
}

loadRoutes();
</script>
</body>
</html>
